// ─── SESSION GENERATOR ────────────────────────────────────────────────────────
const START=new Date("2026-06-22");
const RACE_DATE=new Date("2026-10-25");
const fd=d=>{const D=new Date(d);return `${D.getFullYear()}-${String(D.getMonth()+1).padStart(2,"0")}-${String(D.getDate()).padStart(2,"0")}`;};
const MONTHS_TH=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const DAYS_TH=["อา","จ","อ","พ","พฤ","ศ","ส"];
const dateLabel=s=>{const d=new Date(s);return `${d.getDate()} ${MONTHS_TH[d.getMonth()]}`;};
const dayTh=s=>DAYS_TH[new Date(s).getDay()];

function genSessions(){
  const S=[];
  for(let w=1;w<=18;w++){
    const ph=w<=4?1:w<=8?2:w<=12?3:w<=16?4:5;
    const mon=new Date(START);mon.setDate(START.getDate()+(w-1)*7);
    const D=(n)=>{const d=new Date(mon);d.setDate(mon.getDate()+n);return fd(d);};
    const P=(s)=>S.push({...s,phase:ph,week:w,xp:ST[s.type]?.xpFn(s.km??0)??0});
    if(w<=4){
      P({id:`w${w}m`,date:D(0),type:"gym_legs",   title:"Legs & Abs Day",       km:0  });
      P({id:`w${w}t`,date:D(1),type:"run_easy",   title:"Easy Run 3 กม.",        km:3  });
      P({id:`w${w}w`,date:D(2),type:"gym_push",   title:"Push Day",              km:0  });
      P({id:`w${w}r`,date:D(3),type:"run_easy",   title:"Easy Run 3 กม. + Walk", km:3  });
      P({id:`w${w}f`,date:D(4),type:"gym_pull",   title:"Pull Day",              km:0  });
      P({id:`w${w}s`,date:D(5),type:"run_long",   title:"Long Run 4–5 กม.",      km:4.5});
    }else if(w<=8){
      P({id:`w${w}m`,date:D(0),type:"gym_legs",    title:"Legs & Abs Day",       km:0  });
      P({id:`w${w}t`,date:D(1),type:"run_easy",    title:"Easy Run 4 กม.",       km:4  });
      P({id:`w${w}w`,date:D(2),type:"gym_push",    title:"Push Day",             km:0  });
      P({id:`w${w}r`,date:D(3),type:"run_interval",title:"Interval 5×400m",      km:3.5});
      P({id:`w${w}f`,date:D(4),type:"gym_pull",    title:"Pull Day",             km:0  });
      P({id:`w${w}s`,date:D(5),type:"run_long",    title:"Long Run 6–7 กม.",     km:6.5});
    }else if(w<=12){
      P({id:`w${w}m`,date:D(0),type:"gym_legs",    title:"Legs & Abs Day",       km:0  });
      P({id:`w${w}t`,date:D(1),type:"run_tempo",   title:"Tempo Run 5 กม.",      km:5  });
      P({id:`w${w}w`,date:D(2),type:"gym_push",    title:"Push Day",             km:0  });
      P({id:`w${w}r`,date:D(3),type:"run_interval",title:"Interval 6×400m",      km:4  });
      P({id:`w${w}f`,date:D(4),type:"gym_pull",    title:"Pull Day",             km:0  });
      P({id:`w${w}s`,date:D(5),type:"run_long",    title:"Long Run 8–9 กม.",     km:8.5});
    }else if(w<=16){
      P({id:`w${w}m`,date:D(0),type:"gym_push",    title:"Push Day (Light)",     km:0  });
      P({id:`w${w}t`,date:D(1),type:"run_tempo",   title:"Tempo Run 6–7 กม.",   km:6.5});
      P({id:`w${w}w`,date:D(2),type:"walk",        title:"Active Recovery Walk", km:0  });
      P({id:`w${w}r`,date:D(3),type:"run_interval",title:"Interval 4×1000m",    km:6  });
      P({id:`w${w}f`,date:D(4),type:"gym_pull",    title:"Pull Day (Light)",     km:0  });
      P({id:`w${w}s`,date:D(5),type:"run_long",    title:"Long Run 10–12 กม.",  km:11 });
    }else if(w===17){

      P({id:`w${w}t`,date:D(1),type:"run_easy",    title:"Easy Run 5 กม.",       km:5});
      P({id:`w${w}w`,date:D(2),type:"walk",        title:"Walk + Foam Roll",     km:0});
      P({id:`w${w}r`,date:D(3),type:"run_interval",title:"Easy Interval 3×400m", km:3});

      P({id:`w${w}r`,date:D(3),type:"run_easy",    title:"Shake-out 2 กม.",      km:2  });
      P({id:`w${w}s`,date:D(5),type:"run_easy",    title:"Pre-Race Jog 1.5 กม.", km:1.5});

}
const SESSIONS=genSessions();
const TOTAL_SESSIONS=SESSIONS.length;

// ─── TIME / PACE UTILITIES ────────────────────────────────────────────────────
function parseTimeToSecs(str){
  if(!str)return null;
  const parts=str.trim().split(':').map(Number);
  if(parts.some(isNaN))return null;
  if(parts.length===2)return parts[0]*60+parts[1];
  if(parts.length===3)return parts[0]*3600+parts[1]*60+parts[2];
  return null;
}
function fmtSecs(s){
  const hh=Math.floor(s/3600),mm=Math.floor((s%3600)/60),sec=Math.round(s%60);
  if(hh>0)return `${hh}:${String(mm).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${mm}:${String(sec).padStart(2,'0')}`;
}
function fmtPace(secPerKm){
  const m=Math.floor(secPerKm/60),s=Math.round(secPerKm%60);
  return `${m}:${String(s).padStart(2,'0')}`;
}
function calcPaceSecKm(timeStr,km){
  const s=parseTimeToSecs(timeStr);
  if(!s||!km||km<0.5)return null;
  return s/km;
}

// ─── 10K PREDICTION ENGINE ────────────────────────────────────────────────────
function predict10K(done){
  const today=fd(new Date());
  const runs=SESSIONS
    .filter(s=>done[s.id]?.time&&s.date<=today&&s.type!=='race'&&s.type.startsWith('run_'))
    .map(s=>{
      const d=done[s.id];
      const secs=parseTimeToSecs(d.time);
      const km=parseFloat(d.km)||s.km;
      if(!secs||km<1.5)return null;
      return{type:s.type,km,secs,pace:secs/km,rpe:d.rpe||5,date:s.date,week:s.week};
    })
    .filter(Boolean)
    .sort((a,b)=>b.date.localeCompare(a.date));
  const baseline10KSecs=5880;
  if(!runs.length)return{seconds:baseline10KSecs,formatted:"1:38:00",pacePer10:"9:48",confidence:"baseline",dataPoints:0,adherence:0,note:"เพิ่มเวลาซ้อมใน Log เพื่อให้ทำนายแม่นยำขึ้น"};
  const preds=[];
  runs.slice(0,16).forEach((r,i)=>{
    const rec=Math.pow(0.87,i);
    const rpeAdj=r.rpe<=4?0.95:r.rpe<=6?1.0:r.rpe<=8?1.04:1.08;
    let p10=null,rel=1;
    switch(r.type){
      case'run_tempo':   p10=r.pace*1.03*600; rel=4.0; break;
      case'run_interval':p10=r.pace*1.12*600; rel=3.0; break;
      case'run_long':    p10=r.pace*0.88*600; rel=2.0; break;
      case'run_easy':    p10=r.pace*0.82*600; rel=1.0; break;
    }
    if(p10&&p10>3600&&p10<9600){preds.push({p:p10*rpeAdj,w:rec*rel});}
  });
  if(!preds.length)return{seconds:baseline10KSecs,formatted:"1:38:00",pacePer10:"9:48",confidence:"ข้อมูลไม่พอ",dataPoints:0,adherence:0,note:"log เวลาซ้อมก่อนนะครับ"};
  const tw=preds.reduce((a,p)=>a+p.w,0);
  let pred=preds.reduce((a,p)=>a+p.p*p.w,0)/tw;
  const scheduled=SESSIONS.filter(s=>s.date<=today).length;
  const doneCnt=Object.keys(done).length;
  const adh=scheduled>0?Math.min(1,doneCnt/scheduled):0.5;
  pred*=(1+(1-adh)*0.06);
  const blendW=Math.max(0,1-preds.length*0.08);
  pred=pred*(1-blendW)+baseline10KSecs*blendW;
  pred=Math.max(3900,Math.min(9000,pred));
  const secs=Math.round(pred);
  const conf=preds.length>=10?"สูง 🎯":preds.length>=5?"ปานกลาง ✓":preds.length>=2?"ต่ำ (log เพิ่ม)":"น้อยมาก";
  return{seconds:secs,formatted:fmtSecs(secs),pacePer10:fmtPace(secs/10),confidence:conf,dataPoints:preds.length,adherence:Math.round(adh*100),note:preds.length<4?"log เวลาทุก session เพื่อให้ทำนายดีขึ้น":null,improvementVsBaseline:Math.round((baseline10KSecs-secs)/60*10)/10};
}

// ─── WEEKLY REPORT ─────────────────────────────────────────────────────────────
function calcWeekReport(week,done){
  const ws=SESSIONS.filter(s=>s.week===week);
  const ds=ws.filter(s=>done[s.id]);
  const planned=ws.length,doneCnt=ds.length;
  const adh=planned>0?Math.round(doneCnt/planned*100):0;
  const plannedKm=ws.reduce((a,s)=>a+s.km,0);
  const actualKm=ds.reduce((a,s)=>a+(parseFloat(done[s.id]?.km)||s.km),0);
  const kmRate=plannedKm>0?Math.round(actualKm/plannedKm*100):0;
  const runsDone=ds.filter(s=>s.type.startsWith('run_'));
  const paces=runsDone.map(s=>calcPaceSecKm(done[s.id]?.time,parseFloat(done[s.id]?.km)||s.km)).filter(Boolean);
  const avgPace=paces.length?paces.reduce((a,b)=>a+b,0)/paces.length:null;
  let bestPace=null,bestSession=null;
  runsDone.forEach(s=>{const p=calcPaceSecKm(done[s.id]?.time,parseFloat(done[s.id]?.km)||s.km);if(p&&(!bestPace||p<bestPace)){bestPace=p;bestSession=s;}});
  const rpes=ds.map(s=>done[s.id]?.rpe).filter(Boolean);
  const avgRPE=rpes.length?rpes.reduce((a,b)=>a+b,0)/rpes.length:null;
  const load=Math.round(ds.reduce((a,s)=>{const rpe=done[s.id]?.rpe||5;const km=parseFloat(done[s.id]?.km)||s.km;return a+(s.type.startsWith('run_')?km*rpe:rpe*3);},0));
  const adhPts=(adh/100)*40,kmPts=Math.min(30,(kmRate/100)*30),rpePts=avgRPE?30*(1-Math.abs(avgRPE-5.5)/8):15;
  const perfScore=Math.round(Math.min(100,adhPts+kmPts+rpePts));
  const bodyStatus=!avgRPE?"ไม่มีข้อมูล":avgRPE<4?"สดมาก 🌟":avgRPE<6?"ดี ✅":avgRPE<8?"ล้าปานกลาง ⚠️":"ล้ามาก 🔴";
  const phase=PHASES.find(p=>p.weeks.includes(week));
  const tips=[];
  if(adh<80)tips.push("พยายามทำให้ครบทุก session สัปดาห์หน้า");
  if(avgRPE&&avgRPE>8)tips.push("ร่างกายล้า — เพิ่มเวลานอนและเน้น recovery");
  if(avgRPE&&avgRPE<4&&adh>90)tips.push("ร่างกายสดมาก — ลอง push pace เพิ่มขึ้นเล็กน้อย");
  if(kmRate<70)tips.push("ระยะทำได้น้อย — ตรวจสอบการวางแผนเวลา");
  if(!tips.length&&phase)tips.push(`Phase ${phase.id}: ${phase.name} — ${phase.id<=2?"เน้น aerobic base ต่อไป":phase.id<=4?"เริ่มเน้น quality sessions":"ลด volume รักษาความเร็ว"}`);
  return{week,adh,doneCnt,planned,plannedKm:Math.round(plannedKm*10)/10,actualKm:Math.round(actualKm*10)/10,kmRate,avgPace,avgRPE:avgRPE?Math.round(avgRPE*10)/10:null,load,perfScore,bodyStatus,bestPace,bestSession,tips,phase};
}

// ─── GAMIFICATION STATS ───────────────────────────────────────────────────────
function calcStats(done){
  const ids=new Set(Object.keys(done));
  let totalXP=0,km=0,runs=0,gym=0,intervals=0,longRuns=0,longestRun=0,perfectWks=0,raceDone=false,phaseDone=0,maxStreak=0;
  const weeklyKm={},weeklyDone={};
  SESSIONS.forEach(s=>{
    if(!weeklyDone[s.week])weeklyDone[s.week]={done:0,total:0};
    weeklyDone[s.week].total++;
    if(!weeklyKm[s.week])weeklyKm[s.week]=0;
    if(ids.has(s.id)){
      const d=done[s.id];const aKm=parseFloat(d.km)||s.km;
      totalXP+=d.xp??s.xp;km+=aKm;weeklyKm[s.week]+=aKm;weeklyDone[s.week].done++;
      if(s.type.startsWith('run_')||s.type==='race'){runs++;if(aKm>longestRun)longestRun=aKm;}
      if(s.type==='run_long'||s.type==='race')longRuns++;
      if(s.type==='run_interval')intervals++;
      if(s.type.startsWith('gym_')||s.type==='light_gym')gym++;
      if(s.type==='race')raceDone=true;
    }
  });
  Object.values(weeklyDone).forEach(w=>{if(w.total>0&&w.done===w.total)perfectWks++;});
  PHASES.forEach(ph=>{const phS=SESSIONS.filter(s=>s.phase===ph.id);if(phS.length>0&&phS.every(s=>ids.has(s.id)))phaseDone=Math.max(phaseDone,ph.id);});
  const cd=new Set();SESSIONS.forEach(s=>{if(ids.has(s.id))cd.add(s.date);});
  const sd=[...cd].sort();let cur=0;
  for(let i=0;i<sd.length;i++){cur=i===0?1:(new Date(sd[i])-new Date(sd[i-1]))/86400000===1?cur+1:1;if(cur>maxStreak)maxStreak=cur;}
  let lvObj=LEVELS[0];for(const l of LEVELS){if(totalXP>=l.xp)lvObj=l;}
  const nextLv=LEVELS[lvObj.lv]??null;
  const lvPct=nextLv?Math.min(100,Math.round(((totalXP-lvObj.xp)/(nextLv.xp-lvObj.xp))*100)):100;
  const earnedBadges=BADGES.filter(b=>b.chk({runs,gym,intervals,longRuns,longestRun:Math.round(longestRun*10)/10,km:Math.round(km*10)/10,perfectWks,phaseDone,maxStreak,raceDone})).map(b=>b.id);
  return{totalXP,km:Math.round(km*10)/10,runs,gym,intervals,longRuns,longestRun:Math.round(longestRun*10)/10,perfectWks,phaseDone,maxStreak,raceDone,weeklyKm,weeklyDone,earnedBadges,lvObj,nextLv,lvPct,totalSessions:ids.size,completionRate:Math.round((ids.size/TOTAL_SESSIONS)*100)};
}

function Stats({stats,done}){
  const cw=getCW();
  const[reportWeek,setReportWeek]=useState(cw);
  const[showReport,setShowReport]=useState(false);
  const totalXPPossible=SESSIONS.reduce((a,s)=>a+s.xp,0);
  const paceHistory=[];
  for(let w=Math.max(1,cw-5);w<=cw;w++){
    const runs=SESSIONS.filter(s=>s.week===w&&done[s.id]?.time&&s.type.startsWith('run_'));
    const paces=runs.map(s=>calcPaceSecKm(done[s.id]?.time,parseFloat(done[s.id]?.km)||s.km)).filter(Boolean);
    paceHistory.push({w,avg:paces.length?paces.reduce((a,b)=>a+b,0)/paces.length:null});
  }
  const hasPaceData=paceHistory.some(p=>p.avg);
  const overallRows=[
    {l:"Sessions เสร็จ",v:stats.totalSessions,t:TOTAL_SESSIONS,c:C.green},
    {l:"KM สะสม",v:stats.km,t:250,c:C.blue},
    {l:"XP สะสม",v:stats.totalXP,t:totalXPPossible,c:C.gold},
  ];
  return div({style:{padding:"16px 16px 0",animation:"fadeUp .3s ease"}},
    div({style:{marginBottom:14}},
      div({style:{fontSize:12,fontWeight:600,color:C.inkMid,letterSpacing:.5,textTransform:"uppercase",marginBottom:10}},"🎯 คาดการณ์เวลา 10K"),
      h(PredictionCard,{done})
    ),
    div({className:"card shadow-sm",style:{padding:"14px 16px",marginBottom:14}},
      div({style:{fontSize:12,fontWeight:600,color:C.inkMid,letterSpacing:.5,textTransform:"uppercase",marginBottom:12}},"📊 รายงานประจำสัปดาห์"),
      div({style:{display:"flex",gap:8,marginBottom:12,alignItems:"center"}},
        btn({onClick:()=>setReportWeek(w=>Math.max(1,w-1)),style:{background:C.grayL,border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",color:C.inkMid,fontSize:16}},"‹"),
        div({style:{flex:1,textAlign:"center",fontSize:13,fontWeight:600}},`สัปดาห์ที่ ${reportWeek}`),
        btn({onClick:()=>setReportWeek(w=>Math.min(cw,w+1)),style:{background:C.grayL,border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",color:C.inkMid,fontSize:16}},"›")
      ),
      btn({className:"btn-primary",onClick:()=>setShowReport(true)},`📊 ดูรายงานสัปดาห์ที่ ${reportWeek}`)
    ),
    hasPaceData&&div({className:"card shadow-sm",style:{padding:"14px 16px",marginBottom:14}},
      div({style:{fontSize:12,fontWeight:600,color:C.inkMid,letterSpacing:.5,textTransform:"uppercase",marginBottom:10}},"📈 Pace Trend (สัปดาห์ล่าสุด)"),
      div({style:{display:"flex",gap:6,alignItems:"flex-end",height:80}},
        ...paceHistory.map((p,i)=>{
          if(!p.avg)return div({key:i,style:{flex:1,display:"flex",alignItems:"flex-end",justifyContent:"center"}},div({style:{fontSize:9,color:C.inkLight,textAlign:"center"}},`W${p.w}\n—`));
          const best=Math.min(...paceHistory.filter(x=>x.avg).map(x=>x.avg));
          const worst=Math.max(...paceHistory.filter(x=>x.avg).map(x=>x.avg));
          const range=worst-best||1;
          const isCur=p.w===cw;
          const hh=Math.max(20,Math.round(((worst-p.avg)/range)*55+15));
          return div({key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
            div({style:{fontSize:8,color:isCur?C.blue:C.inkMid,fontWeight:isCur?"700":"400"}},fmtPace(p.avg)),
            div({style:{width:"100%",height:hh,background:isCur?C.blue:C.blueM,borderRadius:"6px 6px 0 0",minHeight:16}}),
            div({style:{fontSize:8,color:isCur?C.blue:C.inkLight}},`W${p.w}`)
          );
        })
      ),
      div({style:{fontSize:10,color:C.inkMid,marginTop:8,textAlign:"center"}},"แท่งสูง = เพซเร็ว (ดีกว่า) 🏃")
    ),
    div({className:"card shadow-sm",style:{padding:"14px 16px",marginBottom:14}},
      div({style:{fontSize:12,fontWeight:600,color:C.inkMid,letterSpacing:.5,textTransform:"uppercase",marginBottom:4}},"🏃 KM รายสัปดาห์"),
      div({style:{fontSize:11,color:C.inkLight,marginBottom:10}},"🟠 = สัปดาห์ปัจจุบัน"),
      h(WeekKmChart,{weeklyKm:stats.weeklyKm})
    ),
    div({className:"card shadow-sm",style:{padding:"14px 16px",marginBottom:14}},
      div({style:{fontSize:12,fontWeight:600,color:C.inkMid,letterSpacing:.5,textTransform:"uppercase",marginBottom:12}},"📊 ภาพรวม 18 สัปดาห์"),
      ...overallRows.map((r,i)=>div({key:i,style:{marginBottom:12}},
        div({style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
          span({style:{fontSize:12,color:C.inkMid}},r.l),
          span({style:{fontSize:12,color:r.c,fontWeight:600}},`${typeof r.v==="number"&&r.v>999?r.v.toLocaleString():r.v} / ${typeof r.t==="number"&&r.t>999?r.t.toLocaleString():r.t}`)
        ),
        div({className:"bar-wrap"},div({className:"bar-fill",style:{width:`${Math.min(100,Math.round((r.v/r.t)*100))}%`,background:r.c}}))
      ))
    ),
    showReport&&h(WeeklyReportModal,{week:reportWeek,done,onClose:()=>setShowReport(false)}),
    div({style:{height:90}})
  );
}

async function driveBackup(data){
  if(!DRIVE_URL)return;
  try{await fetch(DRIVE_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'save',key:'ptm:v5:done',value:JSON.stringify(data)})});}catch(e){}
}
async function driveRestore(){
  if(!DRIVE_URL)return null;
  try{const r=await fetch(DRIVE_URL+'?action=load&key=ptm:v5:done');const j=await r.json();return j.value?JSON.parse(j.value):null;}catch{return null;}
}

function DriveModal({onClose}){
  const[url,setUrl]=useState(DRIVE_URL);
  const[status,setStatus]=useState('');
  const[busy,setBusy]=useState(false);
  const save=()=>{DRIVE_URL=url;localStorage.setItem('ptm:drive_url',url);setStatus('✅ บันทึกแล้ว');};
  const testBackup=async()=>{setBusy(true);setStatus('กำลัง backup...');try{const d=JSON.parse(localStorage.getItem('ptm:v5:done')||'{}');await driveBackup(d);setStatus('✅ Backup สำเร็จ');}catch(e){setStatus('❌ ล้มเหลว: '+e.message);}setBusy(false);};
  const restore=async()=>{setBusy(true);setStatus('กำลัง restore...');const d=await driveRestore();if(d){localStorage.setItem('ptm:v5:done',JSON.stringify(d));setStatus('✅ Restore สำเร็จ — รีเฟรชหน้า');window.location.reload();}else setStatus('❌ ไม่มีข้อมูล');setBusy(false);};
  return div({style:{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"flex-end"}},
    div({style:{position:"absolute",inset:0,background:"rgba(28,26,46,.45)",backdropFilter:"blur(4px)"},onClick:onClose}),
    div({style:{position:"relative",zIndex:1,width:"100%",background:"#fff",borderRadius:"24px 24px 0 0",padding:"20px 20px max(24px,env(safe-area-inset-bottom))",animation:"slideUp .28s ease",maxWidth:430,margin:"0 auto"}},
      div({style:{display:"flex",justifyContent:"center",marginBottom:16}},div({style:{width:40,height:4,borderRadius:100,background:"#E4E0DB"}})),
      div({style:{fontSize:16,fontWeight:700,marginBottom:4}},"☁️ Google Drive Sync"),
      div({style:{fontSize:12,color:"#6B6785",marginBottom:16,lineHeight:1.6}},"วาง Apps Script Web App URL เพื่อ sync ข้อมูลกับ Google Drive"),
      h('label',{style:{fontSize:11,fontWeight:600,color:"#6B6785",display:"block",marginBottom:6}},"Apps Script URL"),
      h('input',{className:"inp",value:url,onChange:e=>setUrl(e.target.value),placeholder:"https://script.google.com/macros/s/...",style:{marginBottom:12}}),
      div({style:{display:"flex",gap:8,marginBottom:12}},
        btn({className:"btn-ghost",style:{flex:1},onClick:save},"💾 บันทึก"),
        btn({className:"btn-ghost",style:{flex:1,opacity:busy?.6:1},onClick:restore,disabled:busy},"☁️ Restore"),
        btn({className:"btn-primary",style:{flex:1,padding:"11px 8px",opacity:busy?.6:1},onClick:testBackup,disabled:busy},"⬆️ Backup")
      ),
      status&&div({style:{background:status.includes('✅')?"#EDFBF4":"#FFF0EB",border:`1px solid ${status.includes('✅')?"#A7F3D0":"#FFD4C2"}`,borderRadius:12,padding:"10px 14px",fontSize:13,color:status.includes('✅')?"#0A7C52":"#E8501A",textAlign:"center"}},status)
    )
  );
}

function App({headerRight}){
  const[tab,setTab]=useState("home");
  const[done,setDone]=useState(()=>{try{return JSON.parse(localStorage.getItem('ptm:v5:done')||'{}')}catch{return{}}});
  const[modal,setModal]=useState(null);
  const[xpAnim,setXpAnim]=useState(null);
  const[badgeAnim,setBadgeAnim]=useState(null);
  const[autoReport,setAutoReport]=useState(null);
  const cw=getCW();

  useEffect(()=>{
    const today=new Date();
    if(today.getDay()===0){const key=`ptm:sunday:${fd(today)}`;if(!localStorage.getItem(key)){setAutoReport(cw);localStorage.setItem(key,'shown');}}
    // Hide splash
    setTimeout(()=>{const sp=document.getElementById('splash');if(sp){sp.style.opacity='0';setTimeout(()=>sp.remove(),400);}},300);
  },[]);

  useEffect(()=>{try{localStorage.setItem('ptm:v5:done',JSON.stringify(done));}catch(e){};},[done]);

  const stats=useMemo(()=>calcStats(done),[done]);

  const logSession=(id,data)=>{
    const s=SESSIONS.find(x=>x.id===id);if(!s)return;
    const prev=calcStats(done).earnedBadges;
    const nd={...done,[id]:{km:data.km??s.km,xp:s.xp,time:data.time||"",rpe:data.rpe||5,feel:data.feel||3,notes:data.notes||"",at:new Date().toISOString()}};
    setDone(nd);
    setXpAnim({xp:s.xp,k:Date.now()});
    setTimeout(()=>setXpAnim(null),2600);
    const nb=calcStats(nd).earnedBadges.filter(b=>!prev.includes(b));
    if(nb.length>0)setTimeout(()=>{setBadgeAnim(BADGES.find(b=>b.id===nb[0]));setTimeout(()=>setBadgeAnim(null),3200);},1300);
  };
  const unlog=(id)=>{const nd={...done};delete nd[id];setDone(nd);};

  const TABS=[{id:"home",l:"HQ",e:"⚡"},{id:"schedule",l:"Missions",e:"📋"},{id:"trophies",l:"Trophies",e:"🏆"},{id:"stats",l:"Stats",e:"📊"}];

  return div({style:{minHeight:"100dvh",maxWidth:430,margin:"0 auto",background:C.bg,position:"relative",overflowX:"hidden"}},
    div({style:{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"12px 16px 11px",position:"sticky",top:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"space-between"}},
      div(null,
        div({style:{fontSize:14,fontWeight:700,color:C.ink}},"Personal Training Mission"),
        div({style:{fontSize:11,color:C.orange,fontWeight:500,marginTop:1}},`W${cw}/18 · ${stats.lvObj.emoji} Lv.${stats.lvObj.lv} · ${stats.totalXP.toLocaleString()} XP`)
      ),
      div({style:{display:"flex",gap:6,alignItems:"center"}},
        btn({onClick:()=>setAutoReport(cw),style:{background:C.grayL,border:"none",borderRadius:10,padding:"7px 10px",cursor:"pointer",fontSize:13,color:C.inkMid}},"📊"),
        headerRight
      )
    ),
    div({style:{overflowY:"auto",height:"calc(100dvh - 56px - 62px - env(safe-area-inset-bottom))"}},
      tab==="home"     &&h(Dashboard,{stats,done,cw,onTap:setModal}),
      tab==="schedule" &&h(Schedule,{done,onTap:setModal}),
      tab==="trophies" &&h(Achievements,{stats}),
      tab==="stats"    &&h(Stats,{stats,done})
    ),
    div({style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.white,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom)",zIndex:100}},
      ...TABS.map(t=>btn({key:t.id,className:`tab-btn${tab===t.id?" on":""}`,onClick:()=>setTab(t.id)},
        span({style:{fontSize:20}},t.e),
        span(null,t.l)
      ))
    ),
    modal&&h(LogModal,{session:modal,doneData:done[modal.id],onLog:logSession,onUnlog:unlog,onClose:()=>setModal(null)}),
    autoReport&&h(WeeklyReportModal,{week:autoReport,done,onClose:()=>setAutoReport(null)}),
    xpAnim&&h('div',{key:xpAnim.k,style:{position:"fixed",top:"38%",left:"50%",zIndex:500,background:C.orange,color:"#fff",padding:"10px 26px",borderRadius:100,fontSize:"1.35rem",fontWeight:800,boxShadow:"0 6px 24px rgba(232,80,26,.4)",animation:"xpFloat 2.5s ease-out forwards",whiteSpace:"nowrap",pointerEvents:"none"}},`⚡ +${xpAnim.xp} XP!`),
    badgeAnim&&h('div',{key:badgeAnim.id,style:{position:"fixed",top:"50%",left:"50%",zIndex:500,background:C.white,border:`2px solid ${C.gold}`,borderRadius:24,padding:"28px 36px",textAlign:"center",boxShadow:"0 20px 60px rgba(28,26,46,.2)",animation:"popIn .45s cubic-bezier(.4,0,.2,1) forwards",minWidth:220}},
      div({style:{fontSize:54}},badgeAnim.emoji),
      div({style:{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,margin:"10px 0 4px",textTransform:"uppercase"}},"Badge Unlocked!"),
      div({style:{fontSize:17,fontWeight:700,color:C.ink}},badgeAnim.name),
      div({style:{fontSize:12,color:C.inkMid,marginTop:4}},badgeAnim.desc)
    )
  );
}

function RootApp(){
  const[driveOpen,setDriveOpen]=useState(false);
  return h(Fragment,null,
    h(App,{headerRight:btn({onClick:()=>setDriveOpen(true),style:{background:DRIVE_URL?"#EDFBF4":"#F1F0EE",border:`1px solid ${DRIVE_URL?"#A7F3D0":"#E4E0DB"}`,borderRadius:10,padding:"7px 10px",cursor:"pointer",fontSize:14,color:DRIVE_URL?"#0A7C52":"#6B6785"}},"☁️")}),
    driveOpen&&h(DriveModal,{onClose:()=>setDriveOpen(false)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(RootApp,null));
</script>
</body>
</html>
