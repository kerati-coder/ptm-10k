// ── GOOGLE DRIVE SYNC ─────────────────────────────────────────────────────────
let DRIVE_URL=localStorage.getItem('ptm:drive_url')||'';
async function driveBackup(data){
  if(!DRIVE_URL)return;
  try{await fetch(DRIVE_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'save',key:'ptm:v6:done',value:JSON.stringify(data)})});}catch(e){}
}
async function driveRestore(){
  if(!DRIVE_URL)return null;
  try{const r=await fetch(DRIVE_URL+'?action=load&key=ptm:v6:done');const j=await r.json();return j.value?JSON.parse(j.value):null;}catch{return null;}
}

      P({id:`w${w}m`,date:D(0),type:"gym_legs",   title:"Legs & Abs Day",       km:0  });

// ─── TIME UTILITIES ──────────────────────────────────────────────────────────
function parseTimeToSecs(str){
  if(!str)return null;
  const p=str.trim().split(':').map(Number);
  if(p.some(isNaN))return null;
  if(p.length===2)return p[0]*60+p[1];
  if(p.length===3)return p[0]*3600+p[1]*60+p[2];
  return null;
}
function fmtSecs(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.round(s%60);
  if(h>0)return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtPace(spk){
  if(!spk||spk<=0)return '—';
  const m=Math.floor(spk/60),s=Math.round(spk%60);
  return `${m}:${String(s).padStart(2,'0')}`;
}
function calcPaceSecKm(timeStr,km){
  const s=parseTimeToSecs(timeStr);
  if(!s||!km||km<0.5)return null;
  return s/km;
}
function fmtDuration(secs){
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60);
  if(h>0)return `${h}ชม. ${m}น.`;
  return `${m}น.`;
}

  const baseline=5880; // 1:38:00
  const runs=SESSIONS
    .filter(s=>done[s.id]?.time&&s.date<=today&&s.type!=='race'&&s.type.startsWith('run_'))
    .map(s=>{
      const d=done[s.id];
      const secs=parseTimeToSecs(d.time);
      const km=parseFloat(d.km)||s.km;
      if(!secs||km<1.5)return null;
      return{type:s.type,km,secs,pace:secs/km,rpe:d.rpe||5,date:s.date,week:s.week};
    }).filter(Boolean).sort((a,b)=>b.date.localeCompare(a.date));

  if(!runs.length)return{
    seconds:baseline,formatted:"1:38:00",pacePer10:"9:48",
    confidence:"baseline",dataPoints:0,adherence:0,note:"log เวลาซ้อมเพื่อให้ทำนายแม่นยำขึ้น",
    improvementVsBaseline:0
  };

  const preds=[];
  runs.slice(0,16).forEach((r,i)=>{
    const rec=Math.pow(0.87,i);
    const rpeAdj=r.rpe<=4?0.95:r.rpe<=6?1.0:r.rpe<=8?1.04:1.08;
    let p10=null,rel=1;
    switch(r.type){
      case'run_tempo':    p10=r.pace*1.03*600; rel=4.0; break;
      case'run_interval': p10=r.pace*1.12*600; rel=3.0; break;
      case'run_long':     p10=r.pace*0.88*600; rel=2.0; break;
      case'run_easy':     p10=r.pace*0.82*600; rel=1.0; break;
    }
    if(p10&&p10>3600&&p10<9600)preds.push({p:p10*rpeAdj,w:rec*rel});
  });

  if(!preds.length)return{
    seconds:baseline,formatted:"1:38:00",pacePer10:"9:48",
    confidence:"ข้อมูลไม่พอ",dataPoints:0,adherence:0,note:"กรุณา log เวลาซ้อมก่อน",
    improvementVsBaseline:0
  };

  const tw=preds.reduce((a,p)=>a+p.w,0);
  let pred=preds.reduce((a,p)=>a+p.p*p.w,0)/tw;

  const scheduled=SESSIONS.filter(s=>s.date<=today).length;
  const adh=scheduled>0?Math.min(1,Object.keys(done).length/scheduled):0.5;
  pred*=(1+(1-adh)*0.06);

  const blendW=Math.max(0,1-preds.length*0.08);
  pred=pred*(1-blendW)+baseline*blendW;
  pred=Math.max(3900,Math.min(9000,pred));

  const secs=Math.round(pred);
  const conf=preds.length>=10?"สูง 🎯":preds.length>=5?"ปานกลาง":preds.length>=2?"ต่ำ":"น้อยมาก";
  const imp=Math.round((baseline-secs)/60*10)/10;

  // Confidence percentage for display
  const confPct = Math.min(95, Math.round(20 + preds.length * 7.5));

  return{
    seconds:secs,formatted:fmtSecs(secs),
    pacePer10:fmtPace(secs/10),
    confidence:conf,confPct,
    dataPoints:preds.length,
    adherence:Math.round(adh*100),
    note:preds.length<4?"log เวลาทุก session เพื่อให้ทำนายดีขึ้น":null,
    improvementVsBaseline:imp,
    targetMin:fmtSecs(Math.round(secs*0.97)),
    targetMax:fmtSecs(Math.round(secs*1.03)),
  };
}

// ─── GAMIFICATION STATS ───────────────────────────────────────────────────────
function calcStats(done){
  const ids=new Set(Object.keys(done));
  let totalXP=0,km=0,runs=0,gym=0,intervals=0,longRuns=0,longestRun=0,perfectWks=0,raceDone=false,phaseDone=0,maxStreak=0;
  const weeklyKm={},weeklyDone={},weeklyTime={};
  SESSIONS.forEach(s=>{
    if(!weeklyDone[s.week])weeklyDone[s.week]={done:0,total:0};
    weeklyDone[s.week].total++;
    if(!weeklyKm[s.week])weeklyKm[s.week]=0;
    if(!weeklyTime[s.week])weeklyTime[s.week]=0;
    if(ids.has(s.id)){
      const d=done[s.id];const aKm=parseFloat(d.km)||s.km;
      totalXP+=d.xp??s.xp;km+=aKm;weeklyKm[s.week]+=aKm;weeklyDone[s.week].done++;
      const t=parseTimeToSecs(d.time);if(t)weeklyTime[s.week]+=t;
      if(s.type.startsWith('run_')||s.type==='race'){runs++;if(aKm>longestRun)longestRun=aKm;}
      if(s.type==='run_long'||s.type==='race')longRuns++;
      if(s.type==='run_interval')intervals++;
      if(s.type.startsWith('gym_')||s.type==='light_gym')gym++;
      if(s.type==='race')raceDone=true;
    }
  });
  Object.values(weeklyDone).forEach(w=>{if(w.total>0&&w.done===w.total)perfectWks++;});
  PHASES.forEach(ph=>{const phS=SESSIONS.filter(s=>s.phase===ph.id);if(phS.length>0&&phS.every(s=>ids.has(s.id)))phaseDone=Math.max(phaseDone,ph.id);});
  const cd=new Set();SESSIONS.forEach(s=>{if(ids.has(s.id))cd.add(s.date);});
  const sd=[...cd].sort();let cur=0;
  for(let i=0;i<sd.length;i++){cur=i===0?1:(new Date(sd[i])-new Date(sd[i-1]))/86400000===1?cur+1:1;if(cur>maxStreak)maxStreak=cur;}
  let lvObj=LEVELS[0];for(const l of LEVELS){if(totalXP>=l.xp)lvObj=l;}
  const nextLv=LEVELS[lvObj.lv]??null;
  const lvPct=nextLv?Math.min(100,Math.round(((totalXP-lvObj.xp)/(nextLv.xp-lvObj.xp))*100)):100;
  const earnedBadges=BADGES.filter(b=>b.chk({runs,gym,intervals,longRuns,longestRun:Math.round(longestRun*10)/10,km:Math.round(km*10)/10,perfectWks,phaseDone,maxStreak,raceDone})).map(b=>b.id);
  return{totalXP,km:Math.round(km*10)/10,runs,gym,intervals,longRuns,longestRun:Math.round(longestRun*10)/10,perfectWks,phaseDone,maxStreak,raceDone,weeklyKm,weeklyDone,weeklyTime,earnedBadges,lvObj,nextLv,lvPct,totalSessions:ids.size,completionRate:Math.round((ids.size/TOTAL_SESSIONS)*100)};
}
const getCW=()=>{const d=Math.floor((new Date()-START)/(7*86400000));return Math.max(1,Math.min(18,d+1));};
const daysToRace=()=>Math.max(0,Math.ceil((RACE_DATE-new Date())/86400000));

// ─── WEEKLY REPORT ────────────────────────────────────────────────────────────
function calcWeekReport(week,done){
  const ws=SESSIONS.filter(s=>s.week===week),ds=ws.filter(s=>done[s.id]);
  const adh=ws.length>0?Math.round(ds.length/ws.length*100):0;
  const plannedKm=ws.reduce((a,s)=>a+s.km,0);
  const actualKm=ds.reduce((a,s)=>a+(parseFloat(done[s.id]?.km)||s.km),0);
  const kmRate=plannedKm>0?Math.round(actualKm/plannedKm*100):0;
  const runs=ds.filter(s=>s.type.startsWith('run_'));
  const paces=runs.map(s=>calcPaceSecKm(done[s.id]?.time,parseFloat(done[s.id]?.km)||s.km)).filter(Boolean);
  const avgPace=paces.length?paces.reduce((a,b)=>a+b,0)/paces.length:null;
  let bestPace=null,bestSession=null;
  runs.forEach(s=>{const p=calcPaceSecKm(done[s.id]?.time,parseFloat(done[s.id]?.km)||s.km);if(p&&(!bestPace||p<bestPace)){bestPace=p;bestSession=s;}});
  const rpes=ds.map(s=>done[s.id]?.rpe).filter(Boolean);
  const avgRPE=rpes.length?rpes.reduce((a,b)=>a+b,0)/rpes.length:null;
  const load=Math.round(ds.reduce((a,s)=>{const rpe=done[s.id]?.rpe||5;const km=parseFloat(done[s.id]?.km)||s.km;return a+(s.type.startsWith('run_')?km*rpe:rpe*3);},0));
  const perfScore=Math.round(Math.min(100,(adh/100)*40+Math.min(30,(kmRate/100)*30)+(avgRPE?30*(1-Math.abs(avgRPE-5.5)/8):15)));
  const bodyStatus=!avgRPE?"ไม่มีข้อมูล":avgRPE<4?"สดมาก 🌟":avgRPE<6?"ดี ✅":avgRPE<8?"ล้าปานกลาง ⚠️":"ล้ามาก 🔴";
  const tips=[];
  if(adh<80)tips.push("พยายามทำให้ครบทุก session สัปดาห์หน้า");
  if(avgRPE&&avgRPE>8)tips.push("ร่างกายล้า — เพิ่มเวลานอนและเน้น recovery");
  if(avgRPE&&avgRPE<4&&adh>90)tips.push("ร่างกายสดมาก — ลอง push pace เพิ่มขึ้นเล็กน้อย");
  if(kmRate<70)tips.push("ระยะทำได้น้อย — ตรวจสอบการวางแผนเวลา");
  const ph=PHASES.find(p=>p.weeks.includes(week));
  if(!tips.length&&ph)tips.push(`Phase ${ph.id}: เน้น${ph.id<=2?"aerobic base":ph.id<=4?"quality sessions":"ลด volume รักษาความเร็ว"}`);
  return{week,adh,doneCnt:ds.length,planned:ws.length,plannedKm:Math.round(plannedKm*10)/10,actualKm:Math.round(actualKm*10)/10,kmRate,avgPace,avgRPE:avgRPE?Math.round(avgRPE*10)/10:null,load,perfScore,bodyStatus,bestPace,bestSession,tips,phase:ph};
}

  const wTime=wSessions.reduce((a,s)=>{const t=parseTimeToSecs(done[s.id]?.time);return a+(t||0);},0);

  // 12-week km history
  const hist=Array.from({length:12},(_,i)=>{

  const linePath=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const areaPath=`${linePath} L${pts[pts.length-1].x},${H} L${pts[0].x},${H} Z`;

  // Streak dots (last 5 weeks of Mon-Sun)
  const today=new Date();
  const dotDays=Array.from({length:35},(_,i)=>{

  return(

// ─── MICRO COMPONENTS ─────────────────────────────────────────────────────────
function STypePill({type}){
  const s=ST[type]||ST.walk;
  return <span className="pill" style={{background:s.light,color:s.color}}>{s.emoji} {s.label}</span>;
}
function LevelRing({pct,emoji,size=72}){
  const r=29,circ=2*Math.PI*r,dash=circ*(pct/100);
  return(
    <div style={{width:size,height:size,position:"relative",flexShrink:0}}>
      <svg width={size} height={size} viewBox="0 0 68 68">
        <circle cx={34} cy={34} r={r} fill="none" stroke="#EFECEA" strokeWidth={5}/>
        <circle cx={34} cy={34} r={r} fill="none" stroke="#E8501A" strokeWidth={5}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" transform="rotate(-90 34 34)"
          style={{transition:"stroke-dasharray .6s"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.38}}>{emoji}</div>
    </div>
  );
}
function ScoreRing({score,size=80}){
  const r=28,circ=2*Math.PI*r,dash=circ*(score/100);
  const col=score>=80?C.green:score>=60?C.gold:score>=40?C.orange:C.red;
  return(
    <div style={{width:size,height:size,position:"relative",flexShrink:0}}>
      <svg width={size} height={size} viewBox="0 0 68 68">
        <circle cx={34} cy={34} r={r} fill="none" stroke="#EFECEA" strokeWidth={6}/>
        <circle cx={34} cy={34} r={r} fill="none" stroke={col} strokeWidth={6}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" transform="rotate(-90 34 34)"
          style={{transition:"stroke-dasharray .8s"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:20,fontWeight:800,color:col,lineHeight:1}}>{score}</span>
        <span style={{fontSize:8,color:C.inkLight,fontWeight:500}}>/100</span>
      </div>
    </div>
  );
}
function PhaseBar({phaseId,weeklyDone}){
  const ph=PHASES[phaseId-1];
  const done=ph.weeks.reduce((s,w)=>s+(weeklyDone[w]?.done||0),0);
  const total=ph.weeks.reduce((s,w)=>s+(weeklyDone[w]?.total||0),0);
  const pct=total>0?Math.round((done/total)*100):0;
  return(
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <span style={{fontSize:12,fontWeight:500}}>{ph.emoji} {ph.name}</span>
        <span style={{fontSize:11,color:pct===100?C.green:C.inkLight,fontWeight:600}}>{done}/{total}</span>
      </div>
      <div className="bar-wrap"><div className="bar-fill" style={{width:`${pct}%`,background:ph.color}}/></div>
    </div>
  );
}

// ─── SESSION CARD ─────────────────────────────────────────────────────────────
function SessionCard({s,doneData,onTap}){
  const st=ST[s.type]||ST.walk;
  const today=fd(new Date());
  const isToday=s.date===today,isPast=s.date<today,isDone=!!doneData,isRace=s.type==="race";
  const pace=isDone?calcPaceSecKm(doneData.time,parseFloat(doneData.km)||s.km):null;
  const zone=isDone&&doneData.rpe?getRPEZone(doneData.rpe):null;
  return(
    <div className={`card tap shadow-sm ${isToday&&!isDone?"today-glow":""}`}
      onClick={()=>onTap(s)}
      style={{padding:"14px 16px",marginBottom:8,background:isDone?C.greenL:isRace?C.goldL:C.white,
        borderColor:isDone?C.greenM:isRace?"#FDE68A":isToday?C.orange:C.border,opacity:isPast&&!isDone?.52:1}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:46,height:46,borderRadius:14,background:isDone?C.greenL:st.light,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,border:`1px solid ${isDone?C.greenM:st.mid}`}}>
          {isDone?"✅":st.emoji}

        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
            <STypePill type={s.type}/>
            {isDone&&doneData.actType&&<span className="pill" style={{background:C.blueL,color:C.blue}}>{doneData.actType}</span>}
            {isToday&&!isDone&&<span className="pill" style={{background:C.orangeL,color:C.orange,animation:"pulse 1.5s infinite"}}>● วันนี้</span>}
          </div>
          <div style={{fontSize:14,fontWeight:600,color:C.ink,marginBottom:2}}>{s.title}</div>
          <div style={{fontSize:11,color:C.inkMid}}>
            {dayTh(s.date)} {dateLabel(s.date)}{s.km>0?` · ${s.km} กม.`:""} · <span style={{color:C.gold,fontWeight:600}}>+{s.xp} XP</span>
          </div>
          {isDone&&(doneData.time||doneData.rpe)&&(
            <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap",alignItems:"center"}}>
              {doneData.time&&<span style={{fontSize:11,color:C.green,fontWeight:500}}>⏱ {doneData.time}</span>}
              {pace&&<span style={{fontSize:11,color:C.blue,fontWeight:500}}>📍 {fmtPace(pace)}/กม.</span>}
              {zone&&<span style={{fontSize:11,fontWeight:600,color:zone.color}}>● {zone.label}</span>}
            </div>
          )}
        </div>
        <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={C.inkLight} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
  );
}

// ─── LOG MODAL (Full Redesign) ────────────────────────────────────────────────
function LogModal({session,doneData,onLog,onUnlog,onClose}){
  const st=ST[session.type]||ST.walk;
  const isRun=session.type.startsWith('run_')||session.type==='race';

  const [notes,setNotes]=useState(doneData?.notes??"");
  const [showActModal,setShowActModal]=useState(false);

  const pace=useMemo(()=>{
    const p=calcPaceSecKm(time,parseFloat(km));
    return p?fmtPace(p):null;
  },[time,km]);

  return(
    <>
    <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",alignItems:"flex-end"}}>

            <div>
              <STypePill type={session.type}/>
              <div style={{fontSize:17,fontWeight:700,marginTop:5,lineHeight:1.3}}>{session.title}</div>
              <div style={{fontSize:12,color:C.inkMid,marginTop:1}}>{dayTh(session.date)} {dateLabel(session.date)}</div>
            </div>
            <button onClick={onClose} style={{background:C.grayL,border:"none",borderRadius:10,padding:"8px 10px",cursor:"pointer",color:C.inkMid,marginTop:4,flexShrink:0}}>✕</button>
          </div>

          {/* XP + Pace banner */}
          <div style={{background:C.goldL,border:`1px solid ${C.goldM}`,borderRadius:14,padding:"10px 16px",marginBottom:18,display:"flex",gap:0,alignItems:"center"}}>
            <div style={{textAlign:"center",flex:1}}><div style={{fontSize:10,color:C.gold,fontWeight:600}}>XP</div><div style={{fontSize:22,fontWeight:800,color:C.gold}}>+{session.xp}</div></div>
            {session.km>0&&<><div style={{width:1,height:32,background:C.goldM,margin:"0 4px"}}/><div style={{textAlign:"center",flex:1}}><div style={{fontSize:10,color:C.gold,fontWeight:600}}>เป้า</div><div style={{fontSize:22,fontWeight:800,color:C.gold}}>{session.km}<span style={{fontSize:12}}> กม.</span></div></div></>}
            {pace&&<><div style={{width:1,height:32,background:C.goldM,margin:"0 4px"}}/><div style={{textAlign:"center",flex:1}}><div style={{fontSize:10,color:C.blue,fontWeight:600}}>เพซ</div><div style={{fontSize:18,fontWeight:800,color:C.blue}}>{pace}<span style={{fontSize:10}}>/กม.</span></div></div></>}
          </div>

          {/* Distance + Time */}
          {isRun&&(
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <div style={{flex:1}}>
                <label style={{fontSize:11,fontWeight:600,color:C.inkMid,display:"block",marginBottom:5}}>📍 ระยะจริง (กม.)</label>
                <input className="inp" type="number" step="0.1" min="0" value={km} onChange={e=>setKm(e.target.value)} placeholder={session.km}/>
              </div>
              <div style={{flex:1}}>
                <label style={{fontSize:11,fontWeight:600,color:C.inkMid,display:"block",marginBottom:5}}>⏱ เวลา (42:30)</label>

            </div>

            <div style={{marginBottom:16}}>

              <input className="inp" value={time} onChange={e=>setTime(e.target.value)} placeholder="60:00"/>
            </div>
          )}

          {/* Activity type (runs only) */}
          {isRun&&(
            <div style={{marginBottom:18}}>

            </div>
            :<button className="btn-primary" style={{marginBottom:20}} onClick={()=>{onLog(session.id,{km:parseFloat(km)||session.km,time,rpe,actType,notes});onClose();}}>
              ✅ บันทึกการซ้อม · +{session.xp} XP
            </button>}
        </div>
      </div>
    </div>
    {showActModal&&<ActivityTypeModal value={actType} onSelect={setActType} onClose={()=>setShowActModal(false)}/>}
    </>
  );
}

function Schedule({done,onTap}){

  const ph=PHASES.find(p=>p.weeks.includes(week));
  const dc=ws.filter(s=>done[s.id]).length;
  const wKm=ws.filter(s=>done[s.id]).reduce((a,s)=>a+(parseFloat(done[s.id]?.km)||s.km),0);
  const wXP=ws.filter(s=>done[s.id]).reduce((a,s)=>a+(done[s.id]?.xp??0),0);

    <div style={{padding:"16px 16px 0",animation:"fadeUp .3s ease"}}>

          <div style={{flex:1,textAlign:"center"}}>

function App({driveButton}){
  const[tab,setTab]=useState("home");
  const[done,setDone]=useState(()=>{try{return JSON.parse(localStorage.getItem('ptm:v5:done')||'{}')}catch{return{}}});
  const[modal,setModal]=useState(null);
  const[xpAnim,setXpAnim]=useState(null);
  const[badgeAnim,setBadgeAnim]=useState(null);
  const[autoReport,setAutoReport]=useState(null);
  const cw=getCW();

  useEffect(()=>{
    const el=document.createElement('style');el.textContent=CSS;document.head.appendChild(el);
    const today=new Date();
    if(today.getDay()===0){
      const key=`ptm:sunday:${fd(today)}`;
      if(!localStorage.getItem(key)){setAutoReport(cw);localStorage.setItem(key,'shown');}
    }
  },[]);

  useEffect(()=>{
    try{localStorage.setItem('ptm:v5:done',JSON.stringify(done));}catch(e){}
  },[done]);

  const stats=useMemo(()=>calcStats(done),[done]);

  const logSession=(id,data)=>{
    const s=SESSIONS.find(x=>x.id===id);if(!s)return;
    const prev=calcStats(done).earnedBadges;
    const nd={...done,[id]:{km:data.km??s.km,xp:s.xp,time:data.time||"",rpe:data.rpe||0,actType:data.actType||null,notes:data.notes||"",at:new Date().toISOString()}};
    setDone(nd);
    setXpAnim({xp:s.xp,k:Date.now()});
    setTimeout(()=>setXpAnim(null),2600);
    const nb=calcStats(nd).earnedBadges.filter(b=>!prev.includes(b));
    if(nb.length>0)setTimeout(()=>{setBadgeAnim(BADGES.find(b=>b.id===nb[0]));setTimeout(()=>setBadgeAnim(null),3200);},1300);
  };
  const unlog=(id)=>{const nd={...done};delete nd[id];setDone(nd);};

  const TABS=[
    {id:"home",  l:"HQ",      e:<RunnerLogo size={22}/>},
    {id:"schedule",l:"Missions",e:<span style={{fontSize:20}}>📋</span>},
    {id:"trophies",l:"Trophies",e:<span style={{fontSize:20}}>🏆</span>},
    {id:"stats",   l:"Stats",  e:<span style={{fontSize:20}}>📊</span>},
  ];

  return(
    <div style={{minHeight:"100dvh",maxWidth:430,margin:"0 auto",background:C.bg,position:"relative",overflowX:"hidden"}}>
      {/* Header */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"10px 16px 10px",position:"sticky",top:0,zIndex:50,display:"flex",alignItems:"center",gap:10,justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <RunnerLogo size={32} color="#E8501A" bg="#FFF0EB"/>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:C.ink,lineHeight:1.2}}>Personal Training Mission</div>
            <div style={{fontSize:10,color:C.orange,fontWeight:500,marginTop:1}}>W{cw}/18 · {stats.lvObj.emoji} Lv.{stats.lvObj.lv} · {stats.totalXP.toLocaleString()} XP</div>
          </div>
        </div>
        <button onClick={()=>setAutoReport(cw)} style={{background:C.grayL,border:"none",borderRadius:10,padding:"7px 10px",cursor:"pointer",fontSize:13,color:C.inkMid}}>📊</button>
      </div>

      {/* Scroll */}
      <div style={{overflowY:"auto",height:"calc(100dvh - 57px - 62px - env(safe-area-inset-bottom))"}}>
        {tab==="home"     &&<Dashboard stats={stats} done={done} cw={cw} onTap={setModal}/>}
        {tab==="schedule" &&<Schedule  done={done} onTap={setModal}/>}
        {tab==="trophies" &&<Achievements stats={stats}/>}
        {tab==="stats"    &&<Stats stats={stats} done={done}/>}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.white,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom)",zIndex:100}}>
        {TABS.map(t=>(
          <button key={t.id} className={`tab-btn${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)}>
            {t.e}<span>{t.l}</span>
          </button>
        ))}
      </div>

      {modal&&<LogModal session={modal} doneData={done[modal.id]} onLog={logSession} onUnlog={unlog} onClose={()=>setModal(null)}/>}
      {autoReport&&<WeeklyReportModal week={autoReport} done={done} onClose={()=>setAutoReport(null)}/>}

      {xpAnim&&<div key={xpAnim.k} style={{position:"fixed",top:"38%",left:"50%",zIndex:500,background:C.orange,color:"#fff",padding:"10px 26px",borderRadius:100,fontSize:"1.35rem",fontWeight:800,boxShadow:"0 6px 24px rgba(232,80,26,.4)",animation:"xpFloat 2.5s ease-out forwards",whiteSpace:"nowrap",pointerEvents:"none"}}>⚡ +{xpAnim.xp} XP!</div>}
      {badgeAnim&&<div key={badgeAnim.id} style={{position:"fixed",top:"50%",left:"50%",zIndex:500,background:C.white,border:`2px solid ${C.gold}`,borderRadius:24,padding:"28px 36px",textAlign:"center",boxShadow:"0 20px 60px rgba(28,26,46,.2)",animation:"popIn .45s cubic-bezier(.4,0,.2,1) forwards",minWidth:220}}>
        <div style={{fontSize:54}}>{badgeAnim.emoji}</div>
        <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1.5,margin:"10px 0 4px",textTransform:"uppercase"}}>Badge Unlocked!</div>
        <div style={{fontSize:17,fontWeight:700,color:C.ink}}>{badgeAnim.name}</div>
        <div style={{fontSize:12,color:C.inkMid,marginTop:4}}>{badgeAnim.desc}</div>
      </div>}
    </div>
  );
}

// ── ROOT WRAPPER ──────────────────────────────────────────────────────────────
function RootApp(){
  const[driveOpen,setDriveOpen]=useState(false);
  useEffect(()=>{
    setTimeout(()=>{
      const sp=document.getElementById('splash');
      if(sp){sp.style.opacity='0';setTimeout(()=>sp.remove(),400);}
    },800);
  },[]);
  return(
    <>
      <App driveButton={
        <button onClick={()=>setDriveOpen(true)}
          style={{background:DRIVE_URL?"#EDFBF4":"#F1F0EE",border:`1px solid ${DRIVE_URL?"#A7F3D0":"#E4E0DB"}`,borderRadius:9,padding:"7px 9px",cursor:"pointer",fontSize:14,color:DRIVE_URL?"#0A7C52":"#B0ACC4"}}>
          ☁️
        </button>}/>
      {driveOpen&&<DriveModal onClose={()=>setDriveOpen(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RootApp/>);
</script>
</body>
</html>
